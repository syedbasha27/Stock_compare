# Render Blueprint — https://render.com/docs/blueprint-spec
# Put this file at the ROOT of your GitHub repo, alongside app.py and
# requirements.txt. Then in Render: New + -> Blueprint -> pick this repo.
# Render reads this file and provisions everything automatically — no
# manual "Build Command" / "Start Command" typing needed.

services:
  - type: web
    name: nse-index-analytics-api
    runtime: python
    plan: free
    region: singapore          # closest free region to India at time of writing
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
